<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ahmed Mahmoud \u2014 Web & App Designer</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0a0a0f;
    --bg2: #111118;
    --card: #16161f;
    --border: rgba(255,255,255,0.07);
    --accent: #6ee7b7;
    --accent2: #818cf8;
    --accent3: #fb923c;
    --text: #e8e8f0;
    --muted: #6b6b80;
    --white: #ffffff;
  }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 16px;
    line-height: 1.7;
    overflow-x: hidden;
  }

  /* NOISE TEXTURE */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
    opacity: 0.4;
  }

  /* GLOW BLOBS */
  .blob1, .blob2, .blob3 {
    position: fixed;
    border-radius: 50%;
    filter: blur(120px);
    pointer-events: none;
    z-index: 0;
    opacity: 0.12;
  }
  .blob1 { width: 600px; height: 600px; background: var(--accent2); top: -200px; right: -100px; }
  .blob2 { width: 500px; height: 500px; background: var(--accent); bottom: 0; left: -150px; }
  .blob3 { width: 400px; height: 400px; background: var(--accent3); top: 50%; left: 50%; transform: translate(-50%,-50%); }

  /* NAV */
  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    padding: 20px 40px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: rgba(10,10,15,0.7);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
  }
  .nav-logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 1.1rem;
    color: var(--white);
    letter-spacing: -0.02em;
  }
  .nav-logo span { color: var(--accent); }
  .nav-links { display: flex; gap: 32px; }
  .nav-links a {
    color: var(--muted);
    text-decoration: none;
    font-size: 0.875rem;
    font-weight: 500;
    letter-spacing: 0.02em;
    transition: color 0.2s;
  }
  .nav-links a:hover { color: var(--white); }
  .nav-cta {
    background: var(--accent);
    color: #0a0a0f !important;
    padding: 8px 20px;
    border-radius: 100px;
    font-weight: 600 !important;
    transition: opacity 0.2s !important;
  }
  .nav-cta:hover { opacity: 0.85; color: #0a0a0f !important; }

  /* HERO */
  .hero {
    position: relative;
    z-index: 1;
    min-height: 100vh;
    display: flex;
    align-items: center;
    padding: 120px 40px 80px;
    max-width: 1200px;
    margin: 0 auto;
  }
  .hero-inner { max-width: 780px; }
  .hero-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: rgba(110,231,183,0.08);
    border: 1px solid rgba(110,231,183,0.2);
    border-radius: 100px;
    padding: 6px 16px;
    font-size: 0.8rem;
    color: var(--accent);
    font-weight: 500;
    margin-bottom: 32px;
    animation: fadeUp 0.6s ease both;
  }
  .badge-dot {
    width: 6px; height: 6px;
    background: var(--accent);
    border-radius: 50%;
    animation: pulse 2s ease infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(1.3); }
  }
  .hero h1 {
    font-family: 'Syne', sans-serif;
    font-size: clamp(3rem, 7vw, 5.5rem);
    font-weight: 800;
    line-height: 1.05;
    letter-spacing: -0.04em;
    color: var(--white);
    margin-bottom: 24px;
    animation: fadeUp 0.6s 0.1s ease both;
  }
  .hero h1 .highlight {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .hero-desc {
    font-size: 1.15rem;
    color: var(--muted);
    max-width: 560px;
    margin-bottom: 40px;
    line-height: 1.8;
    font-weight: 300;
    animation: fadeUp 0.6s 0.2s ease both;
  }
  .hero-actions {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    animation: fadeUp 0.6s 0.3s ease both;
  }
  .btn-primary {
    background: var(--accent);
    color: #0a0a0f;
    padding: 14px 32px;
    border-radius: 100px;
    font-weight: 600;
    font-size: 0.95rem;
    text-decoration: none;
    transition: transform 0.2s, box-shadow 0.2s;
    box-shadow: 0 0 40px rgba(110,231,183,0.25);
  }
  .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 0 60px rgba(110,231,183,0.4); }
  .btn-secondary {
    background: transparent;
    color: var(--text);
    padding: 14px 32px;
    border-radius: 100px;
    font-weight: 500;
    font-size: 0.95rem;
    text-decoration: none;
    border: 1px solid var(--border);
    transition: border-color 0.2s, background 0.2s;
  }
  .btn-secondary:hover { border-color: rgba(255,255,255,0.2); background: rgba(255,255,255,0.03); }

  .hero-stats {
    display: flex;
    gap: 48px;
    margin-top: 72px;
    padding-top: 40px;
    border-top: 1px solid var(--border);
    animation: fadeUp 0.6s 0.4s ease both;
  }
  .stat-num {
    font-family: 'Syne', sans-serif;
    font-size: 2.2rem;
    font-weight: 800;
    color: var(--white);
    letter-spacing: -0.03em;
  }
  .stat-num span { color: var(--accent); }
  .stat-label { font-size: 0.85rem; color: var(--muted); margin-top: 2px; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* SECTION */
  section {
    position: relative;
    z-index: 1;
    padding: 100px 40px;
    max-width: 1200px;
    margin: 0 auto;
  }
  .section-label {
    font-size: 0.75rem;
    font-weight: 600;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 16px;
  }
  .section-title {
    font-family: 'Syne', sans-serif;
    font-size: clamp(1.8rem, 4vw, 2.8rem);
    font-weight: 800;
    color: var(--white);
    letter-spacing: -0.03em;
    line-height: 1.15;
    margin-bottom: 16px;
  }
  .section-sub {
    color: var(--muted);
    font-size: 1rem;
    max-width: 500px;
    font-weight: 300;
  }

  /* SERVICES */
  .services-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 20px;
    margin-top: 56px;
  }
  .service-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 32px;
    transition: border-color 0.3s, transform 0.3s;
    position: relative;
    overflow: hidden;
  }
  .service-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    opacity: 0;
    transition: opacity 0.3s;
  }
  .service-card:hover { border-color: rgba(110,231,183,0.2); transform: translateY(-4px); }
  .service-card:hover::before { opacity: 1; }
  .service-icon {
    width: 48px; height: 48px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.4rem;
    margin-bottom: 20px;
  }
  .service-card h3 {
    font-family: 'Syne', sans-serif;
    font-size: 1.15rem;
    font-weight: 700;
    color: var(--white);
    margin-bottom: 10px;
  }
  .service-card p { font-size: 0.9rem; color: var(--muted); line-height: 1.7; }
  .service-tags { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 20px; }
  .tag {
    font-size: 0.75rem;
    color: var(--accent);
    background: rgba(110,231,183,0.08);
    border: 1px solid rgba(110,231,183,0.15);
    padding: 4px 10px;
    border-radius: 100px;
  }

  /* SKILLS */
  .skills-section { background: var(--bg2); margin: 0; padding: 100px 40px; max-width: 100%; }
  .skills-inner { max-width: 1200px; margin: 0 auto; }
  .skills-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 16px;
    margin-top: 56px;
  }
  .skill-item {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px 24px;
    display: flex;
    align-items: center;
    gap: 14px;
    transition: border-color 0.2s, background 0.2s;
  }
  .skill-item:hover { border-color: rgba(129,140,248,0.3); background: rgba(129,140,248,0.04); }
  .skill-icon { font-size: 1.5rem; }
  .skill-name { font-weight: 500; font-size: 0.95rem; color: var(--text); }
  .skill-level { font-size: 0.75rem; color: var(--muted); margin-top: 2px; }

  /* PROJECTS */
  .projects-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
    gap: 24px;
    margin-top: 56px;
  }
  .project-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 24px;
    overflow: hidden;
    transition: transform 0.3s, border-color 0.3s;
  }
  .project-card:hover { transform: translateY(-6px); border-color: rgba(251,146,60,0.2); }
  .project-thumb {
    height: 200px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 4rem;
    position: relative;
    overflow: hidden;
  }
  .project-info { padding: 28px; }
  .project-type {
    font-size: 0.75rem;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--accent3);
    margin-bottom: 8px;
  }
  .project-info h3 {
    font-family: 'Syne', sans-serif;
    font-size: 1.2rem;
    font-weight: 700;
    color: var(--white);
    margin-bottom: 10px;
  }
  .project-info p { font-size: 0.88rem; color: var(--muted); line-height: 1.7; }

  /* WHY ME */
  .why-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
    gap: 20px;
    margin-top: 56px;
  }
  .why-item {
    padding: 28px;
    border-radius: 20px;
    border: 1px solid var(--border);
    transition: background 0.2s;
  }
  .why-item:hover { background: var(--card); }
  .why-num {
    font-family: 'Syne', sans-serif;
    font-size: 2.5rem;
    font-weight: 800;
    color: var(--border);
    margin-bottom: 12px;
  }
  .why-item h4 { font-weight: 600; color: var(--white); margin-bottom: 8px; font-size: 1rem; }
  .why-item p { font-size: 0.875rem; color: var(--muted); }

  /* CTA */
  .cta-section {
    text-align: center;
    padding: 120px 40px;
    max-width: 1200px;
    margin: 0 auto;
  }
  .cta-box {
    background: linear-gradient(135deg, rgba(110,231,183,0.06), rgba(129,140,248,0.06));
    border: 1px solid rgba(110,231,183,0.12);
    border-radius: 32px;
    padding: 80px 60px;
    position: relative;
    overflow: hidden;
  }
  .cta-box::before {
    content: '';
    position: absolute;
    top: 0; left: 50%; transform: translateX(-50%);
    width: 60%; height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
  }
  .cta-box h2 {
    font-family: 'Syne', sans-serif;
    font-size: clamp(2rem, 4vw, 3.2rem);
    font-weight: 800;
    color: var(--white);
    letter-spacing: -0.03em;
    margin-bottom: 16
