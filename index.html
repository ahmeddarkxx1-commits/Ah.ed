<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ahmed Mahmoud \u2014 Portfolio</title>
<style>

* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #0d0d14;
  --card: #14141e;
  --border: #1e1e2e;
  --accent: #5eedb7;
  --purple: #7c6af7;
  --orange: #f97316;
  --text: #e2e2ee;
  --muted: #666680;
  --white: #ffffff;
}

html { scroll-behavior: smooth; }

body {
  background-color: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  font-size: 16px;
  line-height: 1.7;
}

a { text-decoration: none; color: inherit; }

/* ===== NAV ===== */
nav {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 999;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 18px 32px;
  background: rgba(13,13,20,0.9);
  border-bottom: 1px solid var(--border);
  backdrop-filter: blur(16px);
}
.logo {
  font-size: 1.1rem;
  font-weight: 800;
  color: var(--white);
  letter-spacing: -0.02em;
}
.logo span { color: var(--accent); }
.nav-links { display: flex; gap: 28px; align-items: center; }
.nav-links a {
  font-size: 0.875rem;
  color: var(--muted);
  font-weight: 500;
  transition: color 0.2s;
}
.nav-links a:hover { color: var(--white); }
.nav-cta {
  background: var(--accent) !important;
  color: #0d0d14 !important;
  padding: 8px 20px;
  border-radius: 50px;
  font-weight: 700 !important;
  font-size: 0.85rem !important;
}

/* ===== HERO ===== */
.hero {
  padding: 130px 32px 90px;
  max-width: 1100px;
  margin: 0 auto;
}

.badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  border: 1px solid rgba(94,237,183,0.25);
  background: rgba(94,237,183,0.06);
  padding: 6px 16px;
  border-radius: 50px;
  font-size: 0.8rem;
  color: var(--accent);
  font-weight: 600;
  margin-bottom: 28px;
}
.dot {
  width: 7px; height: 7px;
  background: var(--accent);
  border-radius: 50%;
  animation: blink 2s ease infinite;
}
@keyframes blink {
  0%,100%{opacity:1} 50%{opacity:0.3}
}

h1 {
  font-size: clamp(2.8rem, 7vw, 5.2rem);
  font-weight: 900;
  line-height: 1.05;
  letter-spacing: -0.04em;
  color: var(--white);
  margin-bottom: 24px;
}
h1 .grad {
  background: linear-gradient(135deg, var(--accent) 0%, var(--purple) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.hero-desc {
  font-size: 1.1rem;
  color: var(--muted);
  max-width: 540px;
  margin-bottom: 36px;
  font-weight: 300;
  line-height: 1.9;
}

.btns { display: flex; gap: 14px; flex-wrap: wrap; margin-bottom: 60px; }
.btn-g {
  background: var(--accent);
  color: #0d0d14;
  padding: 14px 30px;
  border-radius: 50px;
  font-weight: 700;
  font-size: 0.95rem;
  transition: opacity 0.2s, transform 0.2s;
  box-shadow: 0 0 30px rgba(94,237,183,0.2);
}
.btn-g:hover { opacity: 0.88; transform: translateY(-2px); }
.btn-o {
  background: transparent;
  color: var(--text);
  padding: 14px 30px;
  border-radius: 50px;
  font-weight: 500;
  font-size: 0.95rem;
  border: 1px solid var(--border);
  transition: border-color 0.2s;
}
.btn-o:hover { border-color: rgba(255,255,255,0.2); }

.stats {
  display: flex;
  gap: 40px;
  padding-top: 36px;
  border-top: 1px solid var(--border);
  flex-wrap: wrap;
}
.stat-n {
  font-size: 2.4rem;
  font-weight: 900;
  color: var(--white);
  line-height: 1;
  letter-spacing: -0.04em;
}
.stat-n em { color: var(--accent); font-style: normal; }
.stat-l { font-size: 0.82rem; color: var(--muted); margin-top: 4px; }

/* ===== SECTION BASE ===== */
.sec {
  padding: 90px 32px;
  max-width: 1100px;
  margin: 0 auto;
}
